name: SGS CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
jobs:

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Executar Suítes de Testes (Unitários e Integração)
        run: mvn test -Dtest=AllUnitTestsSuite,AllIntegrationTestsSuite

      - name: Compilar o pacote JAR
        run: mvn clean package -DskipTests

      - name: Salvar o artefato JAR
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app
          path: target/*.jar

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Baixar o artefato JAR
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-app
          path: target/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sgs-api:latest

      - name: Deploy na AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Autentica o Docker da EC2 no seu Docker Hub de forma segura
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # Baixa a última versão da imagem que o GitHub acabou de compilar
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sgs-api:latest
            
            # Remove o container anterior se ele já estiver rodando
            docker stop sgs-api || true
            docker rm sgs-api || true
            
            # Inicia o novo container mapeando as portas e definindo as configurações de produção
            docker run -d \
              --name sgs-api \
              -p 8080:8080 \
              --restart always \
              -e SPRING_PROFILES_ACTIVE=prod \
              ${{ secrets.DOCKERHUB_USERNAME }}/sgs-api:latest