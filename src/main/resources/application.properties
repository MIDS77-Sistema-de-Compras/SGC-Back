spring.application.name=gerenciamentocompras

spring.profiles.active=dev

server.port=${PORT:8081}
server.address=0.0.0.0

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

security.jwt.secret-key=${SECURITY_JWT_SECRET_KEY}
security.jwt.expiration-time=${SECURITY_JWT_EXPIRATION_TIME}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.config.import=optional:file:.env[.properties]

cloudinary.cloud-name=${CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.enabled=${MAIL_ENABLED:true}
app.frontend.requester-request-url-template=${REQUESTER_REQUEST_URL_TEMPLATE:https://sgc-front-nine.vercel.app/solicitacoes/{requestId}}
app.frontend.coordinator-request-url-template=${COORDINATOR_REQUEST_URL_TEMPLATE:https://sgc-front-nine.vercel.app/solicitacoes/gestao/{requestId}}

app.security.cpf-secret=${CPF_SECRET}

spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.pool-name=SGS-HikariPool

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG

app.cookies.secure=true

# Métricas (Actuator + Prometheus) — protegidas por Basic Auth dedicado, ver WebSecurityConfig
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
management.info.env.enabled=false

actuator.metrics.username=${ACTUATOR_METRICS_USERNAME}
actuator.metrics.password=${ACTUATOR_METRICS_PASSWORD}
